<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="utf-8" />
    <title>הגלריה הווירטואלית</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <link rel="icon" type="image/x-icon" href="heart_logo.png">

    <script>
        const originalMouseMove = AFRAME.components['look-controls'].Component.prototype.onMouseMove;
        AFRAME.components['look-controls'].Component.prototype.onMouseMove = function (event) {
            if (!event) return;
            const sensitivity = 0.3; // 30% מהמהירות המקורית לתנועה חלקה יותר
            const fakeEvent = {
                movementX: (event.movementX || 0) * sensitivity,
                movementY: (event.movementY || 0) * sensitivity,
                screenX: event.screenX,
                screenY: event.screenY,
                clientX: event.clientX,
                clientY: event.clientY,
                button: event.button,
                type: event.type,
                preventDefault: function () { if (event.preventDefault) event.preventDefault(); },
                stopPropagation: function () { if (event.stopPropagation) event.stopPropagation(); }
            };
            originalMouseMove.call(this, fakeEvent);
        };
    </script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Tahoma', sans-serif;
        }

        /* --- מסך הדרכה עליון שייעלם --- */
        #crosshair-hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 16px;
            pointer-events: none;
            z-index: 100;
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 30px;
            border: 1px solid #444;
            direction: rtl;
        }

        /* --- ממשק קריאת הלוחיות --- */
        #reading-ui {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.9) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
            z-index: 1000;
        }

        .reading-content {
            text-align: center;
            color: white;
            max-width: 600px;
            background: rgba(10, 10, 10, 0.85);
            padding: 40px 60px;
            border-radius: 10px;
            border: 1px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            transform: translateY(20px);
            transition: transform 0.5s;
        }

        #reading-ui.active {
            opacity: 1;
            pointer-events: auto;
        }

            #reading-ui.active .reading-content {
                transform: translateY(0);
            }

        .reading-title {
            color: #d4af37;
            font-size: 2.5rem;
            margin-bottom: 15px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
        }

        .reading-desc {
            font-size: 1.4rem;
            line-height: 1.8;
            margin-bottom: 30px;
            color: #eee;
            direction: rtl;
        }

        .back-btn {
            background: transparent;
            color: #d4af37;
            border: 1px solid #d4af37;
            padding: 10px 40px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
            border-radius: 3px;
            outline: none;
        }

            .back-btn:hover {
                background: #d4af37;
                color: black;
                box-shadow: 0 0 15px rgba(212,175,55,0.5);
            }

        /* --- ממשק הקודן --- */
        #numpad-ui {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #111;
            border: 2px solid #333;
            border-top: 3px solid red;
            border-radius: 5px;
            padding: 30px;
            width: 320px;
            display: none;
            pointer-events: auto;
            text-align: center;
            box-shadow: 0 20px 50px rgba(255,0,0,0.2);
            z-index: 1001;
        }

        .close-numpad-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            background: transparent;
            color: #888;
            border: 1px solid #444;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 3px;
            width: 30px;
            height: 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: 0.2s;
            outline: none;
        }

            .close-numpad-btn:hover {
                background: #ff4444;
                color: white;
                border-color: #ff4444;
            }

        #numpad-display {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            font-size: 2.5rem;
            padding: 10px;
            margin-bottom: 20px;
            border: 2px inset #222;
            letter-spacing: 15px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .keys {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .key {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            border-radius: 3px;
            transition: background 0.1s;
            outline: none;
        }

            .key:hover {
                background: #444;
            }

            .key:active {
                background: #000;
            }

            .key.red {
                background: #500;
                color: #ffaaaa;
                border-color: #800;
            }

                .key.red:hover {
                    background: #800;
                }

            .key.green {
                background: #050;
                color: #aaffaa;
                border-color: #080;
            }

                .key.green:hover {
                    background: #080;
                }
    </style>
</head>
<body>

            <div class="reading-desc" id="read-desc">תיאור התמונה והרמז הנסתר יופיעו כאן</div>
            <button class="back-btn" onclick="stepBack()">חזרה לסיור</button>

    </div>

    <script>
        // מעלים את ההנחיה של ה-crosshair אחרי כמה שניות
        setTimeout(() => {
            const hint = document.getElementById('crosshair-hint');
            if (hint) hint.style.opacity = '0';
        }, 8000);

        // --- לוגיקה חסינת תקלות להחזרת פוקוס ו-WASD ---
        function restoreFocus() {
            const canvas = document.querySelector('canvas');
            if (canvas) {
                if (document.activeElement) document.activeElement.blur(); // מונע נעילת פוקוס על כפתורי ה-HTML
                canvas.focus();
                canvas.requestPointerLock();
            }
        }

        // טעינה ופוקוס בלחיצה על המסך (כדי להתחיל את המשחק)
        document.body.addEventListener('click', function () {
            if (document.getElementById('reading-ui').classList.contains('active') || document.getElementById('numpad-ui').style.display === 'block') {
                return; // לא נועל אם פופ-אפ כבר פתוח
            }
            restoreFocus();
        });

        // --- פופ-אפים של התמונות וזום ---
        const readingUI = document.getElementById('reading-ui');
        const readTitle = document.getElementById('read-title');
        const readDesc = document.getElementById('read-desc');
        const cam = document.getElementById('player-camera');

        document.querySelectorAll('.gold-plate').forEach(plate => {
            plate.addEventListener('click', function (e) {
                e.stopPropagation(); // קריטי: מונע נעילה כפולה של העכבר
                document.exitPointerLock();

                // עוצר את ההליכה לחלוטין כדי למנוע תקלות
                cam.setAttribute('look-controls', 'enabled', false);
                cam.setAttribute('wasd-controls', 'enabled', false);

                // מעדכן את הטקסט בפופ-אפ (בלי קופסת ה-DIGIT)
                readTitle.innerText = this.getAttribute('data-title');
                readDesc.innerHTML = this.getAttribute('data-desc');

                // מבצע זום פנימה דרך FOV
                cam.setAttribute('animation__zoom', 'property: fov; from: 80; to: 35; dur: 500; easing: easeOutQuad');

                setTimeout(() => {
                    readingUI.classList.add('active');
                }, 200);
            });
        });

        function stepBack() {
            readingUI.classList.remove('active');

            // זום אאוט
            cam.setAttribute('animation__zoom', 'property: fov; to: 80; dur: 500; easing: easeInOutQuad');

            // מחזיר את היכולת ללכת ולראות
            cam.setAttribute('look-controls', 'enabled', true);
            cam.setAttribute('wasd-controls', 'enabled', true);

            // מחזיר את הפוקוס למשחק באותו הרגע (חובה כדי שה-WASD ימשיך לעבוד)
            restoreFocus();
        }

        // --- לוגיקה של הקודן ---
        const numpadTrigger = document.getElementById('numpad-trigger');
        const numpadUI = document.getElementById('numpad-ui');
        const numpadDisplay = document.getElementById('numpad-display');
        let currentCode = "";

        // כאן מוגדרת הסיסמה: 141625
        const CORRECT_CODE = "141625";

        numpadTrigger.addEventListener('click', function (e) {
            e.stopPropagation();
            document.exitPointerLock();
            cam.setAttribute('look-controls', 'enabled', false);
            cam.setAttribute('wasd-controls', 'enabled', false);
            numpadUI.style.display = 'block';
        });

        function closeNumpad() {
            numpadUI.style.display = 'none';
            cam.setAttribute('look-controls', 'enabled', true);
            cam.setAttribute('wasd-controls', 'enabled', true);
            restoreFocus();
        }

        function pressKey(num) {
            if (currentCode.length < 6) {
                currentCode += num;
                updateDisplay();
            }
        }

        function clearCode() {
            currentCode = "";
            updateDisplay();
            numpadDisplay.style.color = "#0f0";
        }

        function updateDisplay() {
            numpadDisplay.innerText = currentCode.padEnd(6, '_');
        }

        updateDisplay();

        function checkCode() {
            if (currentCode === CORRECT_CODE) {
                numpadDisplay.innerText = "ACCESS";
                numpadDisplay.style.color = "gold";

                setTimeout(() => {
                    window.location.href = "final_stage.html"; // המעבר לשלב הבא!
                }, 1500);

            } else {
                numpadDisplay.innerText = "DENIED";
                numpadDisplay.style.color = "red";
                setTimeout(clearCode, 1000);
            }
        }
    </script>
</body>
</html>
